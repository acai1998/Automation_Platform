master:
  push:
    # ========================================
    # 流水线 1: 构建 Docker 镜像并推送到 CNB 制品库
    # ========================================
    - name: "构建 Docker 镜像 & 推送到 CNB 制品库"
      services:
        - docker  # 声明后，流水线内可以直接使用 docker 命令，且自动登录 CNB 制品库
      stages:
        - name: "构建 Docker 镜像"
          script: |
            docker build \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              .

        - name: "推送镜像到 CNB 制品库"
          script: |
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT}
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            echo "========================================"
            echo "✅ 镜像推送成功！"
            echo "镜像地址: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT}"
            echo "最新镜像: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
            echo "========================================"

    # ========================================
    # 流水线 2: 部署到服务器（SSH 部署方式）
    # ========================================
    - name: "编译构建 & 部署到服务器"
      docker:
        image: node:20-alpine  # 使用 Node.js 镜像以支持 npm 命令
      env:
        APP_DIR: "/opt/Automation_Platform"
        APP_NAME: "autotest-platform"
        # 以下敏感变量请在 CNB 仓库「设置 → CI/CD 变量」中配置：
        #   SERVER_HOST    : 服务器 IP
        #   SERVER_USER    : SSH 登录用户名
        #   SERVER_PORT    : SSH 端口（默认 22）
        #   SERVER_SSH_KEY : SSH 私钥（base64 编码）
      stages:
        - name: "安装依赖"
          script:
            - npm install --production=false

        - name: "构建前端"
          script:
            - npm run build

        - name: "编译后端"
          script:
            - npm run server:build

        - name: "打包产物"
          script:
            - tar -czf /tmp/deploy.tar.gz dist package.json ecosystem.config.js

        - name: "上传并重启服务"
          script: |
            set -e

            # 配置 SSH
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            echo "$SERVER_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            echo "StrictHostKeyChecking no" >> ~/.ssh/config

            _PORT="${SERVER_PORT:-22}"

            # 首次部署：确保目录存在并克隆代码（获取 node_modules 等）
            ssh -i ~/.ssh/deploy_key -p $_PORT $SERVER_USER@$SERVER_HOST "
              if [ ! -d $APP_DIR ]; then
                git clone https://cnb.cool/ImAcaiy/Automation_Platform.git $APP_DIR
                cd $APP_DIR && npm install --production=false
              fi
            "

            # 上传编译产物（只传 dist，不重新编译）
            scp -i ~/.ssh/deploy_key -P $_PORT /tmp/deploy.tar.gz $SERVER_USER@$SERVER_HOST:/tmp/deploy.tar.gz

            # 解压并热重启（耗时极短，几乎不影响服务）
            ssh -i ~/.ssh/deploy_key -p $_PORT $SERVER_USER@$SERVER_HOST "
              set -e
              cd $APP_DIR
              tar -xzf /tmp/deploy.tar.gz
              rm -f /tmp/deploy.tar.gz
              pm2 reload $APP_NAME --update-env 2>/dev/null || pm2 start ecosystem.config.js --env production
              pm2 save
              echo '✅ 部署完成！'
              pm2 status $APP_NAME
            "

            rm -f ~/.ssh/deploy_key
            echo "========================================"
            echo "✅ 全部完成！"
            echo "========================================"
