version: "1.0"
triggers:
  - name: sync_to_github
    event: api_trigger_sync_to_github
    schedule: "*/5 * * * *"  # 每5分钟执行一次
    branch: master
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: "https://github.com/acai1998/Automation_Platform.git"
    steps:
      - name: checkout_cnb_repo
        run: |
          git clone https://cnb.cool/ImAcaiy/Automation_Platform.git
          cd Automation_Platform

      - name: add_github_remote
        run: |
          git remote add github ${{ env.GITHUB_REPO }}

      - name: configure_git_credentials
        run: |
          git config user.name "CNB Sync Bot"
          git config user.email "noreply@cnb.cool"

      - name: force_push_to_github
        run: |
          # 使用GitHub Token进行认证
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > .git/credentials
          git config credential.helper "store --file=.git/credentials"

          # 强制推送到GitHub master分支
          git push github master --force

      - name: cleanup
        if: always()
        run: |
          rm -f .git/credentials
